<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sample Mart</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.header{
    background:#16a34a;
    color:white;
    padding:20px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
}

.card{
    background:white;
    margin:15px;
    padding:15px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.wallet{
    font-size:20px;
    font-weight:bold;
    color:#16a34a;
}

.btn{
    display:block;
    width:100%;
    margin-top:12px;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#16a34a;
    color:white;
    font-size:18px;
}

.footer{
    text-align:center;
    color:#888;
    padding:20px;
}
</style>

</head>

<body>

<div class="header">
🛒 Sample Mart
</div>

<div class="card">
<h2>Welcome 👋</h2>

<p class="wallet">
Wallet Balance ₹0
</p>

<button class="btn">🛍 Open Shop</button>

<button class="btn">📦 My Orders</button>

<button class="btn">👤 My Account</button>

<button class="btn">💳 Recharge</button>

</div>

<div class="footer">
Sample Mart © 2026
</div>

</body>
</html>
